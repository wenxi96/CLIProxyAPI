version: 2

builds:
  - id: "cli-proxy-api"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
      - freebsd
    goarch:
      - amd64
      - arm64
    main: ./cmd/server/
    binary: cli-proxy-api
    ldflags:
      - -s -w -X 'main.Version={{ envOrDefault "VERSION" .Version }}' -X 'main.Commit={{ envOrDefault "COMMIT" .ShortCommit }}' -X 'main.BuildDate={{ envOrDefault "BUILD_DATE" .Date }}' -X 'main.SourceRepository={{ envOrDefault "SOURCE_REPOSITORY" "" }}'
archives:
  - id: "cli-proxy-api"
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{- if eq .Arch "arm64" -}}aarch64{{- else -}}{{ .Arch }}{{- end -}}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - README_CN.md
      - config.example.yaml

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ envOrDefault \"VERSION\" (printf \"%s-local.%s\" .Version .ShortCommit) }}"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
