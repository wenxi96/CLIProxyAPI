name: goreleaser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json
      - name: Fetch required tags
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/router-for-me/CLIProxyAPI.git
          else
            git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git
          fi
          git fetch origin --force "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
          git fetch upstream main --force --tags
      - name: Keep only the triggering tag on HEAD
        run: |
          echo "HEAD tags before cleanup:"
          git tag --points-at HEAD || true

          while IFS= read -r tag; do
            [[ -n "${tag}" ]] || continue
            if [[ "${tag}" != "${GITHUB_REF_NAME}" ]]; then
              git tag -d "${tag}"
            fi
          done < <(git tag --points-at HEAD)

          echo "HEAD tags after cleanup:"
          git tag --points-at HEAD || true
      - uses: actions/setup-go@v6
        with:
          go-version: '>=1.26.0'
          cache: true
      - name: Generate Build Metadata
        run: |
          bash ./scripts/version.sh release "${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
      - name: Generate release notes
        run: |
          bash ./scripts/release-notes.sh release-notes.md
      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          install-only: true
      - name: Run GoReleaser
        run: goreleaser release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ env.VERSION }}
          COMMIT: ${{ env.COMMIT }}
          BUILD_DATE: ${{ env.BUILD_DATE }}
          SOURCE_REPOSITORY: ${{ env.SOURCE_REPOSITORY }}
      - name: Attach release notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
