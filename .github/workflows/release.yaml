name: goreleaser

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json
      - name: Fetch upstream tags
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/router-for-me/CLIProxyAPI.git
          else
            git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git
          fi
          git fetch origin --force --tags
          git fetch upstream main --force --tags
      - uses: actions/setup-go@v6
        with:
          go-version: '>=1.26.0'
          cache: true
      - name: Generate Build Metadata
        run: |
          bash ./scripts/version.sh release "${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
      - name: Generate release notes
        run: |
          bash ./scripts/release-notes.sh release-notes.md
      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          install-only: true
      - name: Run GoReleaser
        run: goreleaser release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ env.VERSION }}
          COMMIT: ${{ env.COMMIT }}
          BUILD_DATE: ${{ env.BUILD_DATE }}
          SOURCE_REPOSITORY: ${{ env.SOURCE_REPOSITORY }}
      - name: Attach release notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  master-snapshot:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json
      - name: Fetch upstream tags
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/router-for-me/CLIProxyAPI.git
          else
            git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git
          fi
          git fetch origin --force --tags
          git fetch upstream main --force --tags
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Generate snapshot metadata
        run: |
          bash ./scripts/version.sh snapshot >> "$GITHUB_ENV"
      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          install-only: true
      - name: Run snapshot GoReleaser
        run: goreleaser release --snapshot --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ env.VERSION }}
          COMMIT: ${{ env.COMMIT }}
          BUILD_DATE: ${{ env.BUILD_DATE }}
          SOURCE_REPOSITORY: ${{ env.SOURCE_REPOSITORY }}
      - name: Generate snapshot release notes
        run: |
          bash ./scripts/release-notes.sh release-notes.md
      - name: Publish snapshot release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.SNAPSHOT_TAG }}
          name: ${{ env.SNAPSHOT_NAME }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          draft: false
          prerelease: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
