name: docker-image

on:
  push:
    branches:
      - master
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  APP_NAME: CLIProxyAPI
  IMAGE_REPOSITORY: ghcr.io/wenxi96/cli-proxy-api

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Fetch upstream tags
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/router-for-me/CLIProxyAPI.git
          else
            git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git
          fi
          git fetch origin --force --tags
          git fetch upstream main --force --tags

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            eval "$(bash ./scripts/version.sh release "${GITHUB_REF_NAME}" | sed 's/^/export /')"
          else
            eval "$(bash ./scripts/version.sh auto-release | sed 's/^/export /')"
          fi

          tags_file="$(mktemp)"
          add_tag() {
            local tag="$1"
            if [[ -n "${tag}" ]] && ! grep -qxF "${tag}" "${tags_file}" 2>/dev/null; then
              echo "${tag}" >> "${tags_file}"
            fi
          }

          add_tag "${IMAGE_REPOSITORY}:${VERSION}"
          add_tag "${IMAGE_REPOSITORY}:latest"
          add_tag "${IMAGE_REPOSITORY}:sha-${COMMIT}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            add_tag "${IMAGE_REPOSITORY}:${GITHUB_REF_NAME#v}"
          else
            add_tag "${IMAGE_REPOSITORY}:master"
          fi

          {
            echo "version=${VERSION}"
            echo "commit=${COMMIT}"
            echo "build_date=${BUILD_DATE}"
            echo "source_repository=${SOURCE_REPOSITORY}"
            echo "image_repository=${IMAGE_REPOSITORY}"
            echo "tags<<EOF"
            cat "${tags_file}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            SOURCE_REPOSITORY=${{ steps.meta.outputs.source_repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=CLIProxyAPI
            org.opencontainers.image.description=Fork build of CLIProxyAPI for wenxi96
            org.opencontainers.image.source=${{ steps.meta.outputs.source_repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
